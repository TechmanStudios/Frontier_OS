name: Bug report
description: Report a defect in Frontier_OS or Exciton-MoA.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out as much as you can — concrete reproductions get fixed first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Minimal command or code that reproduces the issue. Include the entangled-runtime CLI flags or sweep config if relevant.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 14"
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit / version
      placeholder: "git rev-parse --short HEAD"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / telemetry
      description: Relevant pytest output, replay summary, or sweep artifacts.
      render: shell
