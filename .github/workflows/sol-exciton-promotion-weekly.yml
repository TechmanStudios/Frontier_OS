name: SOL Exciton Promotion Audit — Weekly

on:
  schedule:
    # 09:00 UTC every Monday — runs after the governance-weekly tournament
    # has had a chance to add tilt evidence to state.json, and well after
    # the daily snowball + consumer pipeline has settled.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

concurrency:
  # Joins the snowball concurrency group so promotion_audit never races
  # the engine or other consumers when reading working_mind ledgers.
  group: sol-exciton-snowball-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  promotion_audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Exciton-MoA/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Exciton-MoA/requirements.txt

      - name: Run promotion audit
        working-directory: Exciton-MoA
        run: |
          python scripts/promotion_audit.py \
            --learning-ledger working_mind/frontier-learning-ledger.md \
            --promotions working_mind/repo-memory-promotions.md \
            | tee promotion_audit_outcome.json

      - name: Commit promotion-audit artifacts
        run: |
          git config user.name "sol-exciton-promotion[bot]"
          git config user.email "sol-exciton-promotion@users.noreply.github.com"
          git add Exciton-MoA/working_data/snowball/consumers/promotion_audit || true
          if git diff --cached --quiet; then
            echo "No promotion-audit artifacts to commit"
            exit 0
          fi
          git commit -m "promotion_audit(weekly): run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload promotion-audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sol-exciton-promotion-${{ github.run_id }}
          path: |
            Exciton-MoA/working_data/snowball/consumers/promotion_audit
            Exciton-MoA/promotion_audit_outcome.json
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary
        if: always()
        working-directory: Exciton-MoA
        run: |
          echo "## SOL Exciton Promotion Audit — Weekly" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          if [ -f promotion_audit_outcome.json ]; then
            cat promotion_audit_outcome.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo '{"status":"no_output"}' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
