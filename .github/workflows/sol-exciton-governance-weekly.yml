name: SOL Exciton Governance — Weekly

on:
  schedule:
    # 08:00 UTC every Monday — well after the daily snowball + consumers have
    # settled, so the pair tournament has a fresh week of variants to score.
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

concurrency:
  # Joins the snowball concurrency group so pair_tournament never races with
  # the engine or other consumers on state.json.
  group: sol-exciton-snowball-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pair_tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Exciton-MoA/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Exciton-MoA/requirements.txt

      - name: Run pair-tournament consumer
        working-directory: Exciton-MoA
        run: |
          python scripts/pair_tournament.py --ledger-tail 20 --max-candidates 16 | tee pair_tournament_outcome.json

      - name: Commit governance artifacts
        run: |
          git config user.name "sol-exciton-governance[bot]"
          git config user.email "sol-exciton-governance@users.noreply.github.com"
          git add Exciton-MoA/working_data/snowball/consumers/pair_tournament || true
          git add Exciton-MoA/working_data/snowball/state.json || true
          if git diff --cached --quiet; then
            echo "No governance state changes to commit"
            exit 0
          fi
          git commit -m "pair_tournament(weekly): run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sol-exciton-governance-${{ github.run_id }}
          path: |
            Exciton-MoA/working_data/snowball/consumers/pair_tournament
            Exciton-MoA/pair_tournament_outcome.json
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary
        if: always()
        working-directory: Exciton-MoA
        run: |
          echo "## SOL Exciton Governance — Weekly" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          if [ -f pair_tournament_outcome.json ]; then
            cat pair_tournament_outcome.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo '{"status":"no_output"}' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
